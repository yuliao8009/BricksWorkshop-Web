name: Deploy to GitHub Pages

# 项目页部署：BricksWorkshop-Web
# 部署地址：https://<user>.github.io/BricksWorkshop-Web/
# 前置条件：Settings → Pages → Source 选择 "GitHub Actions"

on:
  # 每当 push 到 main 或 master 分支时触发部署
  push:
    branches:
      - main
      - master

  # 允许您在 Actions 选项卡中手动运行此工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发的部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      # 生成 .nojekyll 文件，防止 GitHub Pages 忽略以下划线开头的文件/文件夹
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      # 复制 index.html 到 404.html 以支持单页应用的路由
      - name: Add 404.html
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传 dist 目录（Vite 的默认打包目录）
          path: './dist'

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
